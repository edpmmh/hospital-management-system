<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bittu Hospital - MultiUser ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .login-bg { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 login-bg flex items-center justify-center z-[200]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-black text-blue-900 mb-2 italic">BITTU HMS</h1>
            <p class="text-gray-400 text-sm mb-6 uppercase tracking-widest font-bold">Staff Secure Login</p>
            <form id="loginForm" class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-gray-500">USER ID</label>
                    <input type="text" id="userId" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. doc01, rec01">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500">PASSWORD</label>
                    <input type="password" id="userPass" required class="w-full p-3 border rounded-lg outline-none" placeholder="••••••">
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-800 transition-all">SIGN IN TO DASHBOARD</button>
            </form>
            <p id="loginError" class="text-red-500 text-xs mt-4 hidden font-bold">Invalid ID or Password!</p>
        </div>
    </div>

    <div id="mainDashboard" class="hidden flex flex-col lg:flex-row min-h-screen">
        
        <div class="w-full lg:w-1/4 bg-slate-900 text-white p-6 shadow-2xl no-print">
            <div class="flex justify-between items-start mb-8">
                <h1 class="text-xl font-black italic text-yellow-500">BITTU HOSPITAL</h1>
                <button onclick="logout()" class="text-xs bg-red-600 px-2 py-1 rounded">Logout</button>
            </div>
            
            <div class="bg-slate-800 p-4 rounded-xl mb-6">
                <p class="text-[10px] opacity-50 font-bold uppercase">Logged in as:</p>
                <h3 id="displayUser" class="font-black text-white uppercase">-</h3>
                <span id="displayRole" class="text-[10px] bg-blue-600 px-2 py-0.5 rounded-full font-bold">Role</span>
            </div>

            <div id="mod-reception" class="role-module hidden space-y-4">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Reception Tasks</h2>
                <form id="regForm" class="space-y-3 bg-slate-800 p-4 rounded-xl">
                    <input type="text" id="regName" placeholder="Patient Name" required class="w-full p-2 bg-slate-700 rounded text-sm outline-none">
                    <input type="text" id="regMrd" readonly class="w-full p-2 bg-black text-yellow-400 font-mono text-xs font-bold rounded">
                    <input type="number" id="regAge" placeholder="Age" required class="w-full p-2 bg-slate-700 rounded text-sm">
                    <select id="regGender" class="w-full p-2 bg-slate-700 rounded text-sm"><option>Male</option><option>Female</option></select>
                    <button type="submit" class="w-full bg-yellow-500 text-slate-900 font-black py-2 rounded text-xs uppercase">Register</button>
                </form>
            </div>
        </div>

        <div class="flex-1 p-6 overflow-y-auto">
            
            <div id="mod-billing" class="role-module hidden glass-card p-6 border-t-4 border-green-500 mb-6">
                <h2 class="font-black text-green-700 mb-4 text-sm uppercase"><i class="fas fa-file-invoice-dollar mr-2"></i> Billing Queue</h2>
                <div id="billQueueList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div id="mod-doctor" class="role-module hidden glass-card p-6 border-t-4 border-purple-600 mb-6">
                <h2 class="font-black text-purple-700 mb-4 text-sm uppercase"><i class="fas fa-stethoscope mr-2"></i> Doctor Consultation</h2>
                <div id="docQueue" class="space-y-3"></div>
            </div>

            <div id="mod-pharmacy" class="role-module hidden glass-card p-6 border-t-4 border-orange-500 mb-6">
                <h2 class="font-black text-orange-700 mb-4 text-sm uppercase"><i class="fas fa-pills mr-2"></i> Pharmacy Dispensary</h2>
                <div id="pharmQueue" class="space-y-3"></div>
            </div>

        </div>
    </div>

    <script>
        const API = "https://hospital-management-system-ln64.onrender.com";
        let currentUser = null;

        // LOGIN LOGIC
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value.toLowerCase();
            const pass = document.getElementById('userPass').value;

            if(pass === "123") { // Default password
                if(id.startsWith('rec')) currentUser = { id, role: 'reception' };
                else if(id.startsWith('bill')) currentUser = { id, role: 'billing' };
                else if(id.startsWith('doc')) currentUser = { id, role: 'doctor' };
                else if(id.startsWith('pharma')) currentUser = { id, role: 'pharmacy' };
            }

            if(currentUser) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                setupDashboard();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        function setupDashboard() {
            document.getElementById('displayUser').innerText = currentUser.id;
            document.getElementById('displayRole').innerText = currentUser.role;
            
            // Hide all modules, then show only the specific one
            document.querySelectorAll('.role-module').forEach(m => m.classList.add('hidden'));
            const targetMod = document.getElementById(`mod-${currentUser.role}`);
            if(targetMod) targetMod.classList.remove('hidden');

            loadDataByRole();
        }

        async function loadDataByRole() {
            // Logic to fetch only specific data based on role
            if(currentUser.role === 'reception') genMrd();
            // ... rest of API calls
        }

        function logout() { location.reload(); }
        function genMrd() { document.getElementById('regMrd').value = "MR-" + Math.floor(100000 + Math.random() * 900000); }

        window.onload = () => { /* Initial setup if needed */ };
    </script>
</body>
</html>

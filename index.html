<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bittu Hospital - Professional Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .sidebar-gradient { background: linear-gradient(180deg, #1e3a8a 0%, #1e40af 100%); }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        
        /* Print Styles */
        @media print {
            body * { visibility: hidden; }
            #receiptModal, #receiptModal * { visibility: visible; }
            #receiptModal { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <div class="w-full lg:w-1/3 sidebar-gradient text-white p-6 shadow-2xl no-print">
            <h1 class="text-2xl font-black mb-6 flex items-center">
                <i class="fas fa-hospital-symbol mr-3 text-yellow-400"></i> BITTU HOSPITAL
            </h1>
            
            <div class="bg-blue-900/50 p-6 rounded-xl border border-blue-400/30">
                <h2 class="text-lg font-bold mb-4"><i class="fas fa-user-plus mr-2"></i> New Registration</h2>
                <form id="regForm" class="space-y-4">
                    <div>
                        <label class="text-xs font-bold opacity-80">PATIENT NAME</label>
                        <input type="text" id="regName" required class="w-full p-3 bg-white/10 border border-white/20 rounded-lg outline-none focus:border-yellow-400 text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold opacity-80">MRD (AUTO)</label>
                            <input type="text" id="regMrd" readonly class="w-full p-3 bg-blue-800 border-none rounded-lg text-yellow-400 font-mono font-bold">
                        </div>
                        <div>
                            <label class="text-xs font-bold opacity-80">MOBILE</label>
                            <input type="text" id="regMobile" required class="w-full p-3 bg-white/10 border border-white/20 rounded-lg">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold opacity-80">AGE</label>
                            <input type="number" id="regAge" required class="w-full p-3 bg-white/10 border border-white/20 rounded-lg">
                        </div>
                        <div>
                            <label class="text-xs font-bold opacity-80">GENDER</label>
                            <select id="regGender" class="w-full p-3 bg-white/10 border border-white/20 rounded-lg text-white">
                                <option class="text-black">Male</option><option class="text-black">Female</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-blue-900 font-black p-4 rounded-xl shadow-lg transition-all">
                        SAVE & REGISTER
                    </button>
                </form>
            </div>
        </div>

        <div class="flex-1 p-4 lg:p-8 no-print overflow-y-auto">
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                
                <div class="glass-card p-6 border-t-4 border-blue-600 h-fit">
                    <h2 class="text-xl font-black text-gray-800 mb-4">PATIENT LIST</h2>
                    <input type="text" id="searchInput" onkeyup="searchPatient()" placeholder="Search Name/MRD..." class="w-full p-3 border rounded-lg mb-4 outline-none">
                    <div class="overflow-y-auto max-h-[500px]">
                        <table class="w-full text-left text-sm">
                            <tbody id="patientTable" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>

                <div id="billingBox" class="glass-card p-6 border-t-4 border-green-600 hidden">
                    <h2 class="text-xl font-black text-gray-800 mb-6 flex items-center">
                        <i class="fas fa-file-invoice-dollar mr-2 text-green-600"></i> OPD BILLING
                    </h2>
                    <form id="billingForm" class="space-y-4">
                        <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                            <p class="text-xs text-green-700 font-bold uppercase">Patient</p>
                            <h3 id="billPatientName" class="text-xl font-black text-green-900">-</h3>
                            <p id="billPatientMrd" class="text-sm font-mono text-green-600">-</p>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">SELECT DOCTOR</label>
                            <select id="billDoctor" class="w-full p-3 border rounded-lg bg-white outline-none" required>
                                <option value="">-- Choose Doctor --</option>
                                <option>Dr. Sharma (Physician)</option><option>Dr. Gupta (Surgeon)</option>
                                <option>Dr. Verma (Pediatrics)</option><option>Dr. Khan (Orthopedic)</option>
                                <option>Dr. Singh (Gynaecology)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">FEES (₹)</label>
                            <input type="number" id="billAmount" value="300" class="w-full p-4 border rounded-lg text-2xl font-black text-blue-800 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-black p-5 rounded-xl shadow-xl transition-all">
                            GENERATE & PRINT BILL
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="receiptOverlay" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-[100]">
        <div id="receiptModal" class="bg-white w-full max-w-sm p-8 rounded-none shadow-2xl relative">
            <div class="text-center border-b-2 border-black pb-4 mb-4">
                <h1 class="text-xl font-black uppercase">Bittu Hospital & Research Centre</h1>
                <p class="text-xs">Pune, Maharashtra | Ph: +91 9876543210</p>
                <div class="mt-2 text-xs font-bold bg-black text-white py-1">OPD CASH RECEIPT</div>
            </div>
            
            <div class="space-y-2 text-sm">
                <div class="flex justify-between"><span>Date:</span> <span id="rDate"></span></div>
                <div class="flex justify-between font-bold"><span>MRD No:</span> <span id="rMrd"></span></div>
                <div class="flex justify-between"><span>Patient:</span> <span id="rName" class="font-bold"></span></div>
                <div class="flex justify-between"><span>Doctor:</span> <span id="rDoctor"></span></div>
                <hr class="border-dashed border-gray-400">
                <div class="flex justify-between text-lg font-black py-2">
                    <span>TOTAL AMOUNT:</span> <span>₹<span id="rAmount"></span></span>
                </div>
                <hr class="border-dashed border-gray-400">
            </div>

            <div class="mt-10 flex justify-between items-end">
                <div class="text-[10px] italic text-gray-500 text-left">System Generated Bill<br>No Signature Required</div>
                <div class="text-center">
                    <div class="w-20 h-0.5 bg-black mb-1"></div>
                    <p class="text-[10px] font-bold">Authorized Sign</p>
                </div>
            </div>

            <div class="mt-8 flex gap-2 no-print">
                <button onclick="window.print()" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold">PRINT NOW</button>
                <button onclick="closeReceipt()" class="flex-1 bg-gray-200 py-2 rounded font-bold">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://hospital-management-system-ln64.onrender.com";
        let patients = [];

        function generateMRD() { document.getElementById('regMrd').value = "MR-" + Math.floor(100000 + Math.random() * 900000); }

        async function loadData() {
            try {
                const res = await fetch(`${API}/get-patients`);
                patients = await res.json();
                renderTable(patients);
            } catch (e) { console.error("API Connection Error"); }
        }

        function renderTable(data) {
            document.getElementById('patientTable').innerHTML = data.map(p => `
                <tr class="hover:bg-blue-50">
                    <td class="p-4">
                        <span class="block font-mono text-blue-600 font-bold text-[10px]">${p.mrd || 'N/A'}</span>
                        <span class="block font-black text-gray-800 uppercase">${p.name}</span>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="selectForBill('${p.name}', '${p.mrd}')" class="bg-green-100 text-green-700 px-3 py-2 rounded font-bold text-xs">BILL NOW</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = { name: document.getElementById('regName').value, mrd: document.getElementById('regMrd').value, 
                           mobile: document.getElementById('regMobile').value, age: document.getElementById('regAge').value, 
                           gender: document.getElementById('regGender').value };
            await fetch(`${API}/register-patient`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Registered!"); document.getElementById('regForm').reset(); generateMRD(); loadData();
        };

        function selectForBill(name, mrd) {
            document.getElementById('billingBox').classList.remove('hidden');
            document.getElementById('billPatientName').innerText = name;
            document.getElementById('billPatientMrd').innerText = mrd;
        }

        document.getElementById('billingForm').onsubmit = async (e) => {
            e.preventDefault();
            const b = { patientName: document.getElementById('billPatientName').innerText, mrd: document.getElementById('billPatientMrd').innerText,
                        doctor: document.getElementById('billDoctor').value, amount: document.getElementById('billAmount').value };
            
            await fetch(`${API}/add-billing`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(b) });

            // Show Receipt
            document.getElementById('rDate').innerText = new Date().toLocaleString();
            document.getElementById('rName').innerText = b.patientName;
            document.getElementById('rMrd').innerText = b.mrd;
            document.getElementById('rDoctor').innerText = b.doctor;
            document.getElementById('rAmount').innerText = b.amount;
            document.getElementById('receiptOverlay').classList.remove('hidden');
        };

        function closeReceipt() { document.getElementById('receiptOverlay').classList.add('hidden'); document.getElementById('billingBox').classList.add('hidden'); }
        function searchPatient() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = patients.filter(p => p.name.toLowerCase().includes(val) || (p.mrd && p.mrd.includes(val)));
            renderTable(filtered);
        }

        window.onload = () => { generateMRD(); loadData(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bittu Clinic ERP - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .sidebar { background: #0f172a; color: white; }
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } #receiptModal { visibility: visible; position: fixed; top: 0; left: 0; width: 100%; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[500]">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
            <h1 class="text-3xl font-black text-center mb-2 italic">BITTU <span class="text-blue-600">HMS</span></h1>
            <p class="text-slate-400 text-xs text-center font-bold uppercase tracking-widest mb-8">Staff Authentication</p>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="uId" placeholder="User ID (admin/doc01/rec01)" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                <input type="password" id="uPass" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-blue-700 transition-all uppercase tracking-widest text-sm">Access Dashboard</button>
            </form>
            <p id="loginError" class="text-red-500 text-xs mt-4 hidden text-center font-bold italic">Invalid ID or Password!</p>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen flex flex-col lg:flex-row">
        
        <div class="w-full lg:w-72 sidebar p-6 shadow-2xl no-print">
            <h1 class="text-2xl font-black text-yellow-500 mb-10 italic tracking-tighter"><i class="fas fa-hospital-alt mr-2"></i>BITTU HEALTH</h1>
            
            <div class="mb-10 p-4 bg-slate-800/50 rounded-2xl border border-white/10">
                <p class="text-[9px] text-slate-400 uppercase font-bold mb-1 tracking-widest">Logged In As</p>
                <p id="userLabel" class="font-black text-white uppercase tracking-tight">-</p>
                <span id="roleBadge" class="text-[9px] bg-blue-600 px-2 py-0.5 rounded font-black uppercase">Role</span>
            </div>

            <nav class="space-y-2 text-sm font-bold opacity-80" id="navMenu">
                <p class="text-[10px] uppercase text-slate-500 mb-4">Core Modules</p>
                </nav>

            <button onclick="logout()" class="mt-20 w-full bg-red-600/20 text-red-500 border border-red-500/50 py-3 rounded-xl text-xs font-black hover:bg-red-600 hover:text-white transition-all">LOGOUT SYSTEM</button>
        </div>

        <div class="flex-1 p-4 lg:p-8 overflow-y-auto">
            
            <div id="mod-reception" class="role-module hidden glass-card p-8 border-t-4 border-blue-500">
                <h2 class="text-xl font-black mb-6 text-slate-700 uppercase tracking-widest"><i class="fas fa-user-plus mr-2 text-blue-600"></i>New Registration</h2>
                <form id="regForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="pName" placeholder="Patient Full Name" class="col-span-2 p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                    <input type="text" id="pMrd" readonly class="p-4 bg-slate-200 font-mono text-blue-700 font-black rounded-xl">
                    <input type="text" id="pMobile" placeholder="Mobile Number" class="p-4 bg-slate-50 border rounded-xl" required>
                    <button type="submit" class="col-span-2 bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg hover:bg-blue-700 transition-all uppercase tracking-widest">Register Patient</button>
                </form>
            </div>

            <div id="mod-billing" class="role-module hidden mt-8 glass-card p-6 border-t-4 border-green-500">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-slate-700 uppercase italic">Billing & Token Queue</h2>
                    <button onclick="refreshData()" class="text-xs bg-green-50 text-green-700 px-3 py-1 rounded-full font-bold hover:bg-green-100"><i class="fas fa-sync mr-1"></i>Refresh</button>
                </div>
                <div id="billTable" class="space-y-3">
                    </div>
            </div>

            <div id="mod-doctor" class="role-module hidden glass-card p-6 border-t-4 border-purple-600">
                <h2 class="text-xl font-black mb-6 text-purple-700 uppercase"><i class="fas fa-stethoscope mr-2"></i>Doctor's Waiting Room</h2>
                <div id="docList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div id="mod-pharmacy" class="role-module hidden glass-card p-6 border-t-4 border-orange-500">
                <h2 class="text-xl font-black mb-6 text-orange-600 uppercase"><i class="fas fa-pills mr-2"></i>Pharmacy Dispatch</h2>
                <div id="pharmList" class="space-y-3">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const API = "https://hospital-management-system-ln64.onrender.com";
        let user = JSON.parse(localStorage.getItem('clinicUser')) || null;

        window.onload = () => { if(user) showDashboard(); };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('uId').value.toLowerCase();
            const pass = document.getElementById('uPass').value;

            if(pass === '123' || id === 'admin') {
                let role = 'reception';
                if(id.startsWith('doc')) role = 'doctor';
                else if(id.startsWith('pharma')) role = 'pharmacy';
                else if(id.startsWith('bill')) role = 'billing';
                else if(id === 'admin') role = 'admin';

                user = { id, role };
                localStorage.setItem('clinicUser', JSON.stringify(user));
                showDashboard();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userLabel').innerText = user.id;
            document.getElementById('roleBadge').innerText = user.role;

            document.querySelectorAll('.role-module').forEach(m => m.classList.add('hidden'));
            
            if(user.role === 'admin') {
                document.querySelectorAll('.role-module').forEach(m => m.classList.remove('hidden'));
            } else {
                document.getElementById(`mod-${user.role}`).classList.remove('hidden');
            }
            
            if(user.role === 'reception' || user.role === 'admin') genMrd();
            refreshData();
        }

        async function refreshData() {
            try {
                // Fetch All Patients for Billing/Reception
                const res = await fetch(`${API}/get-patients`);
                const patients = await res.json();
                
                // Fetch specific queues for Doctor/Pharmacy 
                const qRes = await fetch(`${API}/get-queue/${user.role}`);
                const queue = await qRes.json();
                
                // Logic to render tables based on role goes here
                console.log("Data Refreshed");
            } catch (e) { console.log("Offline"); }
        }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const d = { 
                name: document.getElementById('pName').value, 
                mrd: document.getElementById('pMrd').value, 
                mobile: document.getElementById('pMobile').value 
            };
            await fetch(`${API}/register-patient`, { 
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify(d) 
            });
            alert("Registration Successful!");
            document.getElementById('regForm').reset();
            genMrd();
            refreshData(); // Updates billing list instantly
        };

        function genMrd() { document.getElementById('pMrd').value = "MR-" + Date.now().toString().slice(-6); }
        function logout() { localStorage.removeItem('clinicUser'); location.reload(); }
    </script>
</body>
</html>

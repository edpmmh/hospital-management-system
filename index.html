<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bittu Hospital - Billing & Reg Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .sidebar-gradient { background: linear-gradient(180deg, #1e3a8a 0%, #1e40af 100%); }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <div class="w-full lg:w-1/3 sidebar-gradient text-white p-6 shadow-2xl">
            <h1 class="text-2xl font-black mb-6 flex items-center">
                <i class="fas fa-hospital-symbol mr-3 text-yellow-400"></i> BITTU HOSPITAL
            </h1>
            
            <div class="bg-blue-900/50 p-6 rounded-xl border border-blue-400/30">
                <h2 class="text-lg font-bold mb-4 flex items-center">
                    <i class="fas fa-user-plus mr-2"></i> New Registration
                </h2>
                <form id="regForm" class="space-y-4">
                    <input type="hidden" id="editId">
                    <div>
                        <label class="text-xs font-bold opacity-80">PATIENT FULL NAME</label>
                        <input type="text" id="regName" required class="w-full p-3 bg-white/10 border border-white/20 rounded-lg outline-none focus:border-yellow-400 text-white placeholder-white/50" placeholder="Enter Name">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold opacity-80">MRD (AUTO)</label>
                            <input type="text" id="regMrd" readonly class="w-full p-3 bg-blue-800 border-none rounded-lg text-yellow-400 font-mono font-bold">
                        </div>
                        <div>
                            <label class="text-xs font-bold opacity-80">MOBILE NO.</label>
                            <input type="text" id="regMobile" required class="w-full p-3 bg-white/10 border border-white/20 rounded-lg outline-none" placeholder="10 Digits">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold opacity-80">AGE</label>
                            <input type="number" id="regAge" required class="w-full p-3 bg-white/10 border border-white/20 rounded-lg">
                        </div>
                        <div>
                            <label class="text-xs font-bold opacity-80">GENDER</label>
                            <select id="regGender" class="w-full p-3 bg-white/10 border border-white/20 rounded-lg text-white">
                                <option class="text-black">Male</option>
                                <option class="text-black">Female</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-blue-900 font-black p-4 rounded-xl shadow-lg transition-all">
                        SAVE & REGISTER
                    </button>
                    <button type="button" onclick="resetRegForm()" class="w-full text-sm opacity-70 hover:opacity-100">Reset Form</button>
                </form>
            </div>
        </div>

        <div class="flex-1 p-4 lg:p-8 overflow-y-auto">
            
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                
                <div class="glass-card p-6 border-t-4 border-blue-600">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black text-gray-800 italic">RECENT PATIENTS</h2>
                        <input type="text" id="searchInput" onkeyup="searchPatient()" placeholder="Search..." class="p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="overflow-y-auto max-h-[600px]">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="p-3 font-bold text-gray-500 uppercase">MRD / Name</th>
                                    <th class="p-3 font-bold text-gray-500 uppercase text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="patientTable" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div id="billingBox" class="glass-card p-6 border-t-4 border-green-600 hidden">
                    <h2 class="text-xl font-black text-gray-800 mb-6 flex items-center">
                        <i class="fas fa-file-invoice-dollar mr-2 text-green-600"></i> GENERATE BILLING
                    </h2>
                    <form id="billingForm" class="space-y-4">
                        <div class="bg-green-50 p-4 rounded-lg border border-green-200 mb-4">
                            <p class="text-xs text-green-700 font-bold">SELECTED PATIENT</p>
                            <h3 id="billPatientName" class="text-xl font-black text-green-900 uppercase">-</h3>
                            <p id="billPatientMrd" class="text-sm font-mono text-green-600">-</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">SELECT DOCTOR</label>
                                <select id="billDoctor" class="w-full p-3 border rounded-lg bg-white outline-none focus:ring-2 focus:ring-green-500" required>
                                    <option value="">-- Choose Doctor --</option>
                                    <option>Dr. Sharma (Physician)</option>
                                    <option>Dr. Gupta (Surgeon)</option>
                                    <option>Dr. Verma (Pediatrics)</option>
                                    <option>Dr. Khan (Orthopedic)</option>
                                    <option>Dr. Singh (Gynaecology)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">PAYMENT MODE</label>
                                <select id="billMode" class="w-full p-3 border rounded-lg bg-white outline-none focus:ring-2 focus:ring-green-500">
                                    <option>Cash</option>
                                    <option>PhonePe/GPay</option>
                                    <option>Credit Card</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">FEES (₹)</label>
                            <input type="number" id="billAmount" value="300" class="w-full p-4 border rounded-lg text-2xl font-black text-blue-800 outline-none">
                        </div>

                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-black p-5 rounded-xl shadow-xl transition-all uppercase tracking-widest">
                            Print & Save Bill <i class="fas fa-print ml-2"></i>
                        </button>
                        <button type="button" onclick="hideBilling()" class="w-full text-gray-400 text-sm">Cancel Billing</button>
                    </form>
                </div>

                <div id="emptyBillState" class="glass-card p-12 flex flex-col items-center justify-center text-center border-2 border-dashed border-gray-200">
                    <i class="fas fa-receipt text-6xl text-gray-200 mb-4"></i>
                    <p class="text-gray-400 font-medium">Select a patient from the list<br>to generate a bill.</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        const API = "https://hospital-management-system-ln64.onrender.com";
        let patients = [];

        function generateMRD() {
            document.getElementById('regMrd').value = "MR-" + Math.floor(100000 + Math.random() * 900000);
        }

        async function loadData() {
            try {
                const res = await fetch(`${API}/get-patients`);
                patients = await res.json();
                renderTable(patients);
            } catch (e) { console.error("Error loading patients"); }
        }

        function renderTable(data) {
            document.getElementById('patientTable').innerHTML = data.map(p => `
                <tr class="hover:bg-blue-50 transition-all group">
                    <td class="p-4">
                        <span class="block font-mono text-blue-600 font-bold text-xs">${p.mrd || 'N/A'}</span>
                        <span class="block font-black text-gray-800 uppercase">${p.name}</span>
                        <span class="text-[10px] text-gray-400">${p.age} Y / ${p.gender}</span>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="selectForBill('${p.name}', '${p.mrd}')" class="bg-green-100 text-green-700 hover:bg-green-600 hover:text-white px-4 py-2 rounded-lg font-bold text-xs transition-all shadow-sm">
                            BILL NOW <i class="fas fa-arrow-right ml-1"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function searchPatient() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = patients.filter(p => p.name.toLowerCase().includes(val) || (p.mrd && p.mrd.includes(val)));
            renderTable(filtered);
        }

        // Registration Save
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('regName').value,
                mrd: document.getElementById('regMrd').value,
                mobile: document.getElementById('regMobile').value,
                age: document.getElementById('regAge').value,
                gender: document.getElementById('regGender').value
            };

            await fetch(`${API}/register-patient`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            alert("Patient Registered!");
            resetRegForm();
            loadData();
        };

        // Billing Logic
        function selectForBill(name, mrd) {
            document.getElementById('billingBox').classList.remove('hidden');
            document.getElementById('emptyBillState').classList.add('hidden');
            document.getElementById('billPatientName').innerText = name;
            document.getElementById('billPatientMrd').innerText = mrd;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hideBilling() {
            document.getElementById('billingBox').classList.add('hidden');
            document.getElementById('emptyBillState').classList.remove('hidden');
        }

        document.getElementById('billingForm').onsubmit = async (e) => {
            e.preventDefault();
            const billData = {
                patientName: document.getElementById('billPatientName').innerText,
                mrd: document.getElementById('billPatientMrd').innerText,
                doctor: document.getElementById('billDoctor').value,
                mode: document.getElementById('billMode').value,
                amount: document.getElementById('billAmount').value
            };

            await fetch(`${API}/add-billing`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(billData)
            });

            alert(`Bill Saved for ${billData.doctor}!\nAmount: ₹${billData.amount}`);
            hideBilling();
            document.getElementById('billingForm').reset();
        };

        function resetRegForm() {
            document.getElementById('regForm').reset();
            generateMRD();
        }

        window.onload = () => {
            generateMRD();
            loadData();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bittu Hospital ERP - Final Sync Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.18); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); }
        .sidebar { background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%); }
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } #receiptModal { visibility: visible; position: fixed; top: 0; left: 0; width: 100%; border:none; } }
    </style>
</head>
<body>

    <div class="flex flex-col lg:flex-row min-h-screen">
        <div class="w-full lg:w-72 sidebar text-white p-6 no-print shadow-2xl lg:rounded-r-[30px] z-50">
            <h1 class="text-2xl font-black mb-10 flex items-center text-yellow-400 italic tracking-tighter">
                <i class="fas fa-hospital-symbol mr-3 text-3xl"></i>BITTU HEALTH
            </h1>
            <div class="space-y-6">
                <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                    <h2 class="text-xs font-bold mb-4 uppercase text-slate-300">New Registration</h2>
                    <form id="regForm" class="space-y-3">
                        <input type="text" id="regName" placeholder="Patient Name" required class="w-full p-3 bg-white/10 border border-white/15 rounded-xl outline-none text-white focus:border-yellow-400">
                        <div class="flex gap-2">
                            <input type="text" id="regMrd" readonly class="w-1/2 p-3 bg-slate-900 rounded-xl text-yellow-300 font-mono text-xs font-bold">
                            <input type="number" id="regAge" placeholder="Age" required class="w-1/2 p-3 bg-white/10 border rounded-xl text-white">
                        </div>
                        <input type="text" id="regMobile" placeholder="Mobile No" required class="w-full p-3 bg-white/10 border rounded-xl text-white">
                        <select id="regGender" class="w-full p-3 bg-white/10 border rounded-xl text-white">
                            <option class="text-black">Male</option><option class="text-black">Female</option>
                        </select>
                        <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-blue-950 font-black py-4 rounded-xl shadow-lg transition-all uppercase">Save Patient</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="flex-1 p-6 lg:p-10 no-print space-y-8 overflow-y-auto">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-card p-6 border-l-8 border-blue-500 bg-blue-50">
                    <p class="text-xs font-bold text-blue-700 uppercase">Total Registered</p>
                    <h3 id="statTotalPat" class="text-4xl font-extrabold text-slate-900">0</h3>
                </div>
                <div class="glass-card p-6 border-l-8 border-purple-500 bg-purple-50">
                    <p class="text-xs font-bold text-purple-700 uppercase">In Doctor Queue</p>
                    <h3 id="statWaitingDoc" class="text-4xl font-extrabold text-slate-900">0</h3>
                </div>
                <div class="glass-card p-6 flex items-center justify-center bg-green-50 border border-green-200">
                    <span class="text-green-600 font-black uppercase text-xs animate-pulse"><i class="fas fa-sync mr-2"></i> Live Sync Active</span>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                <div class="glass-card p-6 h-[400px] flex flex-col border-t-4 border-green-500">
                    <h2 class="font-extrabold text-slate-800 uppercase text-sm mb-4 italic">1. Billing Queue</h2>
                    <div class="overflow-y-auto flex-1">
                        <table class="w-full text-xs">
                            <tbody id="patTable" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>

                <div id="billBox" class="glass-card p-6 border-2 border-green-300 hidden bg-green-50/50">
                    <h2 class="font-extrabold text-green-700 mb-6 uppercase text-sm italic">2. Generate Bill</h2>
                    <form id="billForm" class="space-y-4">
                        <div class="p-4 bg-white rounded-xl shadow-sm border">
                            <p class="text-[10px] text-green-600 font-bold uppercase">Patient</p>
                            <p id="bName" class="font-black text-slate-800 uppercase">-</p>
                            <p id="bMrd" class="text-[10px] font-mono text-blue-600">-</p>
                        </div>
                        <select id="bDoc" class="w-full p-4 border rounded-xl text-sm font-bold" required>
                            <option value="">-- Select Doctor --</option>
                            <option>Dr. Sharma</option><option>Dr. Gupta</option><option>Dr. Verma</option>
                        </select>
                        <div class="flex gap-3">
                            <input type="number" id="bAmt" value="300" class="w-2/3 p-4 border rounded-xl text-3xl font-black text-blue-800 outline-none">
                            <button type="submit" class="w-1/3 bg-green-600 text-white font-black rounded-xl hover:bg-green-700 uppercase text-xs">Pay & Queue</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="glass-card p-6 border-l-4 border-purple-600 bg-white">
                <h2 class="font-black text-purple-700 uppercase text-sm mb-6 flex items-center">
                    <i class="fas fa-stethoscope mr-2"></i> 3. Doctor Waiting Room (Auto-Refreshes)
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div id="docQueue" class="md:col-span-5 border-r pr-4 h-[300px] overflow-y-auto space-y-3">
                        </div>
                    <div id="docWorkspace" class="md:col-span-7 hidden space-y-4">
                        <div class="bg-purple-100 p-4 rounded-xl border border-purple-200">
                            <p class="text-[10px] text-purple-600 font-bold uppercase">Consulting:</p>
                            <h3 id="docPatName" class="text-xl font-black uppercase text-purple-900">-</h3>
                        </div>
                        <form id="docForm" class="space-y-4">
                            <input type="hidden" id="docConsId">
                            <textarea id="diag" placeholder="Diagnosis..." class="w-full p-4 border rounded-xl outline-none h-16" required></textarea>
                            <textarea id="meds" placeholder="Medicines..." class="w-full p-4 border border-purple-300 rounded-xl outline-none h-24 font-bold text-blue-900" required></textarea>
                            <button type="submit" class="w-full bg-purple-600 text-white font-black py-4 rounded-xl hover:bg-purple-700 uppercase shadow-lg">Complete Visit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://hospital-management-system-ln64.onrender.com";
        let patients = [];

        function genMrd() { document.getElementById('regMrd').value = "MR-" + Math.floor(100000 + Math.random() * 900000); }

        async function init() {
            try {
                const res = await fetch(`${API}/get-patients`);
                patients = await res.json();
                renderPatTable(patients);
                updateStats();
                refreshQueues(); // First call for queue
            } catch (e) { console.error("Init failed"); }
        }

        // --- DOCTOR QUEUE REFRESHER (The Sync Logic) ---
        async function refreshQueues() {
            try {
                const response = await fetch(`${API}/doctor-queue`);
                if (!response.ok) throw new Error('Network issue');
                const data = await response.json();
                
                const dList = document.getElementById('docQueue');
                if (data.length === 0) {
                    dList.innerHTML = `<div class="text-center py-12 opacity-30 italic text-xs font-bold uppercase"><i class="fas fa-user-clock text-4xl mb-2"></i><br>Line Khali Hai</div>`;
                } else {
                    dList.innerHTML = data.map(q => `
                        <div onclick="openDoctor('${q._id}', '${q.patientName}')" class="p-4 bg-white border border-purple-100 rounded-xl hover:border-purple-600 cursor-pointer transition-all shadow-sm hover:shadow-lg group">
                            <div class="flex justify-between items-center">
                                <p class="font-extrabold text-slate-900 text-sm uppercase tracking-tight">${q.patientName}</p>
                                <span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded-[5px] text-[8px] font-black group-hover:bg-purple-600 group-hover:text-white transition-all">WAITING</span>
                            </div>
                        </div>
                    `).join('');
                }
                
                if(document.getElementById('statWaitingDoc')) {
                    document.getElementById('statWaitingDoc').innerText = data.length;
                }
            } catch (err) { console.error("Sync Error:", err); }
        }

        // Start 5-second interval
        setInterval(refreshQueues, 5000);

        function renderPatTable(data) {
            document.getElementById('patTable').innerHTML = data.map(p => `
                <tr class="hover:bg-blue-50 transition-all">
                    <td class="p-4 border-b">
                        <span class="block font-extrabold text-slate-800 uppercase tracking-tight text-sm">${p.name}</span>
                        <span class="text-[9px] text-blue-600 font-mono font-bold">${p.mrd}</span>
                    </td>
                    <td class="p-4 text-right border-b">
                        <button onclick="setBill('${p.name}', '${p.mrd}')" class="bg-green-100 text-green-700 px-4 py-2 rounded-lg font-black text-[10px] uppercase shadow-sm">Bill</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            document.getElementById('statTotalPat').innerText = patients.length;
        }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const d = { name: document.getElementById('regName').value, mrd: document.getElementById('regMrd').value, age: document.getElementById('regAge').value, mobile: document.getElementById('regMobile').value, gender: document.getElementById('regGender').value };
            await fetch(`${API}/register-patient`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
            document.getElementById('regForm').reset(); genMrd(); init();
        };

        function setBill(n, m) {
            document.getElementById('billBox').classList.remove('hidden');
            document.getElementById('bName').innerText = n; document.getElementById('bMrd').innerText = m;
        }

        document.getElementById('billForm').onsubmit = async (e) => {
            e.preventDefault();
            const b = { patientName: document.getElementById('bName').innerText, mrd: document.getElementById('bMrd').innerText, doctorName: document.getElementById('bDoc').value, amount: document.getElementById('bAmt').value };
            await fetch(`${API}/add-billing`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b) });
            alert("Sent to Doctor!");
            document.getElementById('billBox').classList.add('hidden');
            refreshQueues(); 
        };

        function openDoctor(id, name) {
            document.getElementById('docWorkspace').classList.remove('hidden');
            document.getElementById('docConsId').value = id;
            document.getElementById('docPatName').innerText = name;
        }

        document.getElementById('docForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('docConsId').value;
            const d = { diagnosis: document.getElementById('diag').value, medicines: document.getElementById('meds').value };
            await fetch(`${API}/prescribe-patient/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
            document.getElementById('docWorkspace').classList.add('hidden');
            document.getElementById('docForm').reset();
            refreshQueues(); 
        };

        window.onload = () => { genMrd(); init(); };
    </script>
</body>
</html>

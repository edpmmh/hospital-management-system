<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Admin Pro - Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>

    <nav class="bg-blue-700 p-4 text-white shadow-lg mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🏥 Bittu Hospital Management</h1>
            <span id="server-status" class="bg-red-500 px-3 py-1 rounded-full text-xs">Connecting...</span>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        
        <div class="bg-white p-6 card mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex-1 min-w-[300px]">
                <input type="text" id="searchInput" onkeyup="searchPatient()" placeholder="Search by Name or MRD Number..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button onclick="openModal()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold transition">
                + Add New Patient
            </button>
        </div>

        <div class="bg-white card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-100 border-b">
                    <tr>
                        <th class="p-4">MRD No.</th>
                        <th class="p-4">Patient Name</th>
                        <th class="p-4">Mobile</th>
                        <th class="p-4">Age/Sex</th>
                        <th class="p-4">Address</th>
                        <th class="p-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="patientTable">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="patientModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl overflow-hidden">
            <div class="bg-blue-700 p-4 text-white flex justify-between">
                <h2 id="modalTitle" class="text-xl font-bold">New Registration</h2>
                <button onclick="closeModal()" class="text-2xl">&times;</button>
            </div>
            <form id="regForm" class="p-6 grid grid-cols-2 gap-4">
                <input type="hidden" id="patientId">
                <div class="col-span-2">
                    <label class="block text-sm font-bold mb-1">Full Name</label>
                    <input type="text" id="name" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">MRD Number (Auto)</label>
                    <input type="text" id="mrd" readonly class="w-full p-2 border rounded bg-gray-100">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Mobile</label>
                    <input type="text" id="mobile" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Age</label>
                    <input type="number" id="age" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1">Gender</label>
                    <select id="gender" class="w-full p-2 border rounded">
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-bold mb-1">Address</label>
                    <textarea id="address" class="w-full p-2 border rounded" rows="2"></textarea>
                </div>
                <button type="submit" class="col-span-2 bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-800">
                    SAVE PATIENT DETAILS
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API = "https://hospital-management-system-ln64.onrender.com";
        let allPatients = [];

        // --- LOAD DATA ---
        async function fetchPatients() {
            try {
                const res = await fetch(`${API}/get-patients`);
                allPatients = await res.json();
                renderTable(allPatients);
                document.getElementById('server-status').innerText = "Online";
                document.getElementById('server-status').classList.replace('bg-red-500', 'bg-green-500');
            } catch (err) {
                console.error("Server down");
            }
        }

        function renderTable(data) {
            const table = document.getElementById('patientTable');
            table.innerHTML = data.map(p => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-mono font-bold text-blue-700">${p.mrd || 'N/A'}</td>
                    <td class="p-4 font-bold">${p.name}</td>
                    <td class="p-4">${p.mobile}</td>
                    <td class="p-4">${p.age} / ${p.gender || 'M'}</td>
                    <td class="p-4 text-sm">${p.address || '-'}</td>
                    <td class="p-4">
                        <button onclick="editPatient('${p._id}')" class="text-blue-600 hover:underline mr-3">Edit</button>
                        <button onclick="goToBilling('${p.name}', '${p.mrd}')" class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">OPD Bill</button>
                    </td>
                </tr>
            `).join('');
        }

        // --- SEARCH LOGIC ---
        function searchPatient() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPatients.filter(p => 
                p.name.toLowerCase().includes(val) || 
                (p.mrd && p.mrd.toLowerCase().includes(val))
            );
            renderTable(filtered);
        }

        // --- MODAL & FORM LOGIC ---
        function openModal() {
            document.getElementById('regForm').reset();
            document.getElementById('patientId').value = "";
            document.getElementById('modalTitle').innerText = "New Registration";
            // Generate temporary MRD (e.g., MR2026-001)
            document.getElementById('mrd').value = "MR-" + Date.now().toString().slice(-6);
            document.getElementById('patientModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('patientModal').classList.add('hidden');
        }

        function editPatient(id) {
            const p = allPatients.find(x => x._id === id);
            document.getElementById('patientId').value = p._id;
            document.getElementById('name').value = p.name;
            document.getElementById('mrd').value = p.mrd || "";
            document.getElementById('mobile').value = p.mobile;
            document.getElementById('age').value = p.age;
            document.getElementById('gender').value = p.gender || "Male";
            document.getElementById('address').value = p.address;
            document.getElementById('modalTitle').innerText = "Edit Patient Details";
            document.getElementById('patientModal').classList.remove('hidden');
        }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('patientId').value;
            const data = {
                name: document.getElementById('name').value,
                mrd: document.getElementById('mrd').value,
                mobile: document.getElementById('mobile').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                address: document.getElementById('address').value
            };

            const url = id ? `${API}/update-patient/${id}` : `${API}/register-patient`;
            const method = id ? 'PUT' : 'POST';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            closeModal();
            fetchPatients();
            alert("Success!");
        };

        function goToBilling(name, mrd) {
            alert(`Opening Billing for ${name} (${mrd})...`);
            // Yahan se aap Billing module par bhej sakte hain
        }

        window.onload = fetchPatients;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bittu HMS - Professional Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .sidebar-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } #receiptModal { visibility: visible; position: fixed; top: 0; left: 0; width: 100%; } }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[200]">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md text-center border-t-8 border-blue-600">
            <h1 class="text-4xl font-black text-slate-800 mb-2 italic tracking-tighter">BITTU <span class="text-blue-600">HMS</span></h1>
            <p class="text-slate-400 text-xs mb-8 font-bold uppercase tracking-widest text-center">Staff Login Panel</p>
            <form id="loginForm" class="space-y-5 text-left">
                <input type="text" id="userId" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="User ID (admin/rec01/doc01)">
                <input type="password" id="userPass" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password">
                <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all uppercase tracking-widest text-sm">Login</button>
            </form>
            <p id="loginError" class="text-red-500 text-xs mt-4 hidden font-bold italic">Invalid ID or Password!</p>
        </div>
    </div>

    <div id="mainDashboard" class="hidden flex flex-col lg:flex-row min-h-screen">
        
        <div class="w-full lg:w-1/5 sidebar-gradient text-white p-6 shadow-2xl no-print">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-xl font-black italic text-yellow-500 uppercase tracking-tighter">Bittu Health</h1>
                <button onclick="logout()" class="text-[10px] bg-red-600 px-3 py-1 rounded-full font-bold">LOGOUT</button>
            </div>

            <div class="bg-white/5 p-4 rounded-2xl border border-white/10 mb-8">
                <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Active User</p>
                <h3 id="displayUser" class="font-black text-white uppercase tracking-wide">-</h3>
                <span id="displayRole" class="text-[9px] bg-yellow-500 text-slate-900 px-2 py-0.5 rounded font-black uppercase">Role</span>
            </div>

            <nav class="space-y-2 text-sm font-bold opacity-80" id="navMenu">
                </nav>
        </div>

        <div class="flex-1 p-6 lg:p-10 overflow-y-auto">
            
            <div id="mod-reception" class="role-module hidden space-y-6">
                <div class="glass-card p-8 border-t-4 border-blue-600">
                    <h2 class="text-xl font-black text-slate-800 mb-6 flex justify-between">
                        <span><i class="fas fa-user-plus mr-2 text-blue-600"></i>NEW PATIENT REGISTRATION</span>
                        <span id="tokenDisplay" class="text-blue-600 bg-blue-50 px-4 rounded-lg text-sm">Next Token: T-000</span>
                    </h2>
                    <form id="regForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="col-span-1 md:col-span-2">
                            <label class="text-xs font-black text-slate-500">PATIENT FULL NAME</label>
                            <input type="text" id="regName" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="text-xs font-black text-slate-500">MRD NO (AUTO)</label>
                            <input type="text" id="regMrd" readonly class="w-full p-4 bg-slate-200 font-mono font-bold rounded-xl text-blue-700">
                        </div>
                        <div>
                            <label class="text-xs font-black text-slate-500">MOBILE NUMBER</label>
                            <input type="text" id="regMobile" required class="w-full p-4 bg-slate-50 border rounded-xl">
                        </div>
                        <button type="submit" class="col-span-1 md:col-span-2 bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all uppercase tracking-widest">Register Patient</button>
                    </form>
                </div>
            </div>

            <div id="mod-billing" class="role-module hidden space-y-6">
                <div class="glass-card p-6 border-t-4 border-green-600">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black text-slate-800 uppercase tracking-widest italic">Billing Queue</h2>
                        <button onclick="loadData()" class="text-xs bg-green-50 text-green-700 px-3 py-1 rounded font-bold hover:bg-green-100"><i class="fas fa-sync mr-1"></i>Refresh List</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b">
                                <tr class="text-[10px] font-black text-slate-500 uppercase">
                                    <th class="p-4">Token</th>
                                    <th class="p-4">Patient / MRD</th>
                                    <th class="p-4">Action</th>
                                </tr>
                            </thead>
                            <tbody id="billTable" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            </div>
    </div>

    <script>
        const API = "https://hospital-management-system-ln64.onrender.com";
        let user = JSON.parse(localStorage.getItem('hmsUser')) || null;

        // LOGIN CHECK ON LOAD
        window.onload = () => {
            if(user) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                showModules();
            }
        };

        // LOGIN FORM
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value.toLowerCase();
            const pass = document.getElementById('userPass').value;

            if(pass === '123' || (id === 'admin' && pass === 'admin123')) {
                let role = 'reception';
                if(id === 'admin') role = 'admin';
                else if(id.startsWith('bill')) role = 'billing';
                else if(id.startsWith('doc')) role = 'doctor';
                else if(id.startsWith('pharma')) role = 'pharmacy';

                user = { id, role };
                localStorage.setItem('hmsUser', JSON.stringify(user));
                location.reload();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        function showModules() {
            document.getElementById('displayUser').innerText = user.id;
            document.getElementById('displayRole').innerText = user.role;
            
            // Show modules based on role
            document.querySelectorAll('.role-module').forEach(m => m.classList.add('hidden'));
            
            if(user.role === 'admin') {
                document.getElementById('mod-reception').classList.remove('hidden');
                document.getElementById('mod-billing').classList.remove('hidden');
            } else if(user.role === 'reception') {
                document.getElementById('mod-reception').classList.remove('hidden');
            } else if(user.role === 'billing') {
                document.getElementById('mod-billing').classList.remove('hidden');
            }
            
            genMrd();
            loadData();
        }

        function genMrd() {
            const token = Math.floor(100 + Math.random() * 900);
            document.getElementById('regMrd').value = "MR-" + Date.now().toString().slice(-6);
            if(document.getElementById('tokenDisplay')) document.getElementById('tokenDisplay').innerText = `Next Token: T-${token}`;
        }

        async function loadData() {
            try {
                const res = await fetch(`${API}/get-patients`);
                const patients = await res.json();
                
                // Show in Billing List
                document.getElementById('billTable').innerHTML = patients.map((p, index) => `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="p-4 font-black text-blue-600">T-${100 + index}</td>
                        <td class="p-4">
                            <p class="font-black text-slate-800 uppercase">${p.name}</p>
                            <p class="text-[10px] font-mono text-slate-400">${p.mrd}</p>
                        </td>
                        <td class="p-4">
                            <button onclick="alert('Opening Bill for ${p.name}')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-[10px] font-black hover:bg-green-700">GENERATE BILL</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error("API Error"); }
        }

        // REGISTRATION WITHOUT REFRESH (AJAX)
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('regName').value,
                mrd: document.getElementById('regMrd').value,
                mobile: document.getElementById('regMobile').value,
                token: document.getElementById('tokenDisplay').innerText
            };

            await fetch(`${API}/register-patient`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            alert("Registration Successful! Token Generated.");
            document.getElementById('regForm').reset();
            genMrd(); // Generate new MRD & Token
            loadData(); // Update Billing List instantly
        };

        function logout() {
            localStorage.removeItem('hmsUser');
            location.reload();
        }
    </script>
</body>
</html>

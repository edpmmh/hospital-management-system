<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bittu Hospital - All-in-One Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 15px; }
        .btn-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

    <nav class="btn-gradient p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tight"><i class="fas fa-hospital-user mr-2"></i>BITTU HEALTH ADMIN</h1>
            <div id="status" class="text-xs bg-white text-blue-800 px-3 py-1 rounded-full font-bold shadow-inner">
                <i class="fas fa-circle text-green-500 animate-pulse mr-1"></i>SYSTEM ONLINE
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-6">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="glass-card p-4 border-l-4 border-blue-600 shadow-sm">
                <p class="text-gray-500 text-sm font-bold">TOTAL PATIENTS</p>
                <h3 id="statTotal" class="text-3xl font-black text-blue-900">0</h3>
            </div>
            <div class="glass-card p-4 border-l-4 border-yellow-500 shadow-sm">
                <p class="text-gray-500 text-sm font-bold">WAITING LIST</p>
                <h3 id="statWaiting" class="text-3xl font-black text-yellow-600">0</h3>
            </div>
            <div class="glass-card p-4 border-l-4 border-green-500 shadow-sm">
                <p class="text-gray-500 text-sm font-bold">TODAY'S REVENUE</p>
                <h3 class="text-3xl font-black text-green-600">₹<span id="statRevenue">0</span></h3>
            </div>
            <div class="glass-card p-4 border-l-4 border-purple-500 shadow-sm">
                <p class="text-gray-500 text-sm font-bold">LAB PENDING</p>
                <h3 id="statLab" class="text-3xl font-black text-purple-600">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1">
                <div class="glass-card p-6 shadow-md border border-white sticky top-24">
                    <h2 class="text-xl font-bold mb-4 text-blue-900 flex items-center">
                        <i class="fas fa-user-plus mr-2"></i> Patient Entry
                    </h2>
                    <form id="regForm" class="space-y-4">
                        <input type="hidden" id="editId">
                        <div>
                            <label class="block text-xs font-black text-gray-600 mb-1">FULL NAME</label>
                            <input type="text" id="regName" required class="w-full p-3 border rounded-lg bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-black text-gray-600 mb-1">MRD NUMBER</label>
                                <input type="text" id="regMrd" readonly class="w-full p-3 border rounded-lg bg-gray-100 font-mono text-blue-700 font-bold">
                            </div>
                            <div>
                                <label class="block text-xs font-black text-gray-600 mb-1">MOBILE NO.</label>
                                <input type="text" id="regMobile" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-black text-gray-600 mb-1">AGE</label>
                                <input type="number" id="regAge" required class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-black text-gray-600 mb-1">GENDER</label>
                                <select id="regGender" class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                                    <option>Male</option><option>Female</option><option>Other</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-black text-gray-600 mb-1">ADDRESS</label>
                            <input type="text" id="regAddress" class="w-full p-3 border rounded-lg bg-gray-50 outline-none">
                        </div>
                        <button type="submit" class="w-full btn-gradient text-white p-4 rounded-lg font-bold shadow-lg hover:opacity-90 transition-all flex justify-center items-center">
                            <i class="fas fa-save mr-2"></i> SAVE PATIENT RECORD
                        </button>
                        <button type="button" onclick="resetForm()" class="w-full text-gray-500 text-sm font-bold py-2">Clear Form</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-card p-6 shadow-md border border-white h-full">
                    <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                        <h2 class="text-xl font-bold text-blue-900"><i class="fas fa-list mr-2"></i> Recent Patients</h2>
                        <div class="relative flex-1 max-w-md">
                            <i class="fas fa-search absolute left-3 top-4 text-gray-400"></i>
                            <input type="text" id="searchInput" onkeyup="searchPatient()" placeholder="Quick Search by Name or MRD..." class="w-full pl-10 pr-4 py-3 border rounded-full shadow-inner outline-none focus:ring-2 focus:ring-blue-300">
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-blue-50 text-blue-900 border-b">
                                <tr>
                                    <th class="p-4 text-xs font-black">MRD NO</th>
                                    <th class="p-4 text-xs font-black">NAME</th>
                                    <th class="p-4 text-xs font-black">DETAILS</th>
                                    <th class="p-4 text-xs font-black">ACTIONS</th>
                                </tr>
                            </thead>
                            <tbody id="patientTable" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://hospital-management-system-ln64.onrender.com";
        let patients = [];

        // MRD Generator
        function generateMRD() {
            document.getElementById('regMrd').value = "MRD-" + Math.floor(100000 + Math.random() * 900000);
        }

        // Fetch Data
        async function loadData() {
            try {
                const res = await fetch(`${API}/get-patients`);
                patients = await res.json();
                renderTable(patients);
                updateStats();
            } catch (e) { 
                console.error("API Error"); 
                document.getElementById('status').innerText = "OFFLINE";
                document.getElementById('status').className = "text-xs bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold";
            }
        }

        function updateStats() {
            document.getElementById('statTotal').innerText = patients.length;
            // Dummy revenue for UI feel
            document.getElementById('statRevenue').innerText = patients.length * 200;
        }

        function renderTable(data) {
            document.getElementById('patientTable').innerHTML = data.map(p => `
                <tr class="hover:bg-blue-50 transition-all">
                    <td class="p-4 font-mono font-bold text-blue-700 text-sm">${p.mrd || 'N/A'}</td>
                    <td class="p-4 font-bold text-gray-800">${p.name}</td>
                    <td class="p-4 text-xs text-gray-600">
                        ${p.age} Yrs / ${p.gender}<br>
                        <i class="fas fa-phone mr-1"></i>${p.mobile}
                    </td>
                    <td class="p-4 flex space-x-2">
                        <button onclick="editPatient('${p._id}')" class="p-2 bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="openBill('${p.name}', '${p.mrd}')" class="p-2 bg-green-100 text-green-700 rounded-md hover:bg-green-200" title="Generate Bill">
                            <i class="fas fa-file-invoice-dollar"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Search Logic
        function searchPatient() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = patients.filter(p => p.name.toLowerCase().includes(val) || (p.mrd && p.mrd.includes(val)));
            renderTable(filtered);
        }

        // Save Logic
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('regName').value,
                mrd: document.getElementById('regMrd').value,
                mobile: document.getElementById('regMobile').value,
                age: document.getElementById('regAge').value,
                gender: document.getElementById('regGender').value,
                address: document.getElementById('regAddress').value
            };

            const url = id ? `${API}/update-patient/${id}` : `${API}/register-patient`;
            const method = id ? 'PUT' : 'POST';

            await fetch(url, {
                method, headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            alert(id ? "Record Updated!" : "Patient Registered!");
            resetForm();
            loadData();
        };

        function editPatient(id) {
            const p = patients.find(x => x._id === id);
            document.getElementById('editId').value = p._id;
            document.getElementById('regName').value = p.name;
            document.getElementById('regMrd').value = p.mrd;
            document.getElementById('regMobile').value = p.mobile;
            document.getElementById('regAge').value = p.age;
            document.getElementById('regGender').value = p.gender;
            document.getElementById('regAddress').value = p.address;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('regForm').reset();
            document.getElementById('editId').value = "";
            generateMRD();
        }

        function openBill(name, mrd) {
            alert(`Opening Bill Generation for: ${name} (${mrd})`);
            // Yahan se aap seedha billing post kar sakte hain ya prompt de sakte hain
        }

        window.onload = () => {
            generateMRD();
            loadData();
        };
    </script>
</body>
</html>
